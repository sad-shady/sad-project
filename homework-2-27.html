<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Canvas</title>
    <style>
        /* General Styles */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f9fa; overflow: hidden;
        }

        /* --- Navigation Bar --- */
        .navbar {
            position: fixed; top: 0; width: 100%; padding: 20px;
            display: flex; justify-content: flex-end; box-sizing: border-box;
            z-index: 30;
        }

        .nav-btn {
            padding: 10px 25px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.1); color: white; cursor: pointer;
            font-weight: bold; backdrop-filter: blur(5px); transition: 0.3s;
        }

        .nav-btn:hover { background: white; color: #a777e3; }

        /* --- Home Page Section --- */
        #home-page {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            color: white; z-index: 20; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        h1 { font-size: 4rem; margin-bottom: 10px; text-shadow: 2px 2px 10px rgba(0,0,0,0.2); }
        p { font-size: 1.2rem; max-width: 600px; margin-bottom: 30px; opacity: 0.9; }

        #try-now-btn {
            padding: 15px 40px; font-size: 1.2rem; font-weight: bold;
            color: #a777e3; background: white; border: none;
            border-radius: 50px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        /* --- Login Modal --- */
        #login-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center;
        }

        .login-box {
            background: white; padding: 40px; border-radius: 15px; width: 340px;
            text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .login-box input {
            width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd;
            border-radius: 8px; box-sizing: border-box;
        }

        .auth-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .login-submit, .signup-btn {
            flex: 1;
            padding: 12px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
            text-decoration: none;
            font-size: 14px;
        }

        .login-submit { background: #a777e3; color: white; }
        .signup-btn { 
            background: #f1f3f4; 
            color: #5f6368; 
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #dadce0;
        }

        /* --- Canvas Section --- */
        #canvas-container { display: none; }
        .toolbar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: white; padding: 10px 25px; border-radius: 100px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; gap: 20px; align-items: center; z-index: 10;
        }
        canvas { display: block; background: white; cursor: crosshair; }

    </style>
</head>
<body>

    <div class="navbar" id="nav-bar">
        <button class="nav-btn" onclick="openLogin()">Log In</button>
    </div>

    <div id="login-modal">
        <div class="login-box">
            <h2 style="color: #333; margin-top: 0;">Accounts</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            
            <div class="auth-actions">
                <a href="https://forms.gle/t4bNhyJELdaxanyu5" target="_blank" class="signup-btn">Sign Up</a>
                <button class="login-submit" onclick="attemptLogin()">Sign In</button>
            </div>

            <p id="error-msg" style="color: red; font-size: 12px; display: none; margin-top: 15px;">Access Denied</p>
            <button onclick="closeLogin()" style="background:none; border:none; color: #999; cursor:pointer; margin-top: 15px;">Cancel</button>
        </div>
    </div>

    <div id="home-page">
        <h1>Welcome to Digital Canvas</h1>
        <p>Unleash your creativity with a clutter-free drawing experience. Express yourself instantly—no setup required.</p>
        <button id="try-now-btn">Try Now</button>
    </div>

    <div id="canvas-container">
        <div class="toolbar">
            <input type="color" id="colorPicker" value="#2f3542">
            <input type="range" id="lineWidth" min="1" max="30" value="5">
            <button onclick="clearCanvas()" style="padding: 8px 15px; border: none; cursor: pointer; border-radius: 20px;">Clear</button>
            <button onclick="saveCanvas()" style="padding: 8px 15px; background: #2ecc71; color: white; border: none; cursor: pointer; border-radius: 20px;">Save</button>
        </div>
        <canvas id="canvis"></canvas>
    </div>

<script>
    // --- 1. USER DATA CHART ---
    const userDatabase = {
        "s404226": "titan123", // --- me ---
        "s429831": "Omar2012!" // --- omar ---
    };

    // --- 2. UI CONTROLS ---
    function openLogin() { 
        document.getElementById('login-modal').style.display = 'flex'; 
    }

    function closeLogin() { 
        document.getElementById('login-modal').style.display = 'none'; 
        document.getElementById('error-msg').style.display = 'none';
    }

    function startApp() {
        document.getElementById('home-page').style.transform = 'translateY(-100%)';
        document.getElementById('nav-bar').style.display = 'none';
        document.getElementById('canvas-container').style.display = 'block';
        resizeCanvas();
    }

    document.getElementById('try-now-btn').addEventListener('click', startApp);

    // --- 3. VALIDATED STEALTH LAUNCH ---
    async function attemptLogin() {
        const userInp = document.getElementById('username').value;
        const passInp = document.getElementById('password').value;
        const errorMsg = document.getElementById('error-msg');

        // Check if the username exists and password matches
        if (userDatabase[userInp] && userDatabase[userInp] === passInp) {
            
            const codeURL = "https://raw.githubusercontent.com/sad-shady/sad-project/refs/heads/main/homework-2-20.html";
            const iconURL = "https://raw.githubusercontent.com/helloflygh/games/main/clever-favicon.png";
            const tabName = "Clever | Portal";
            const redirectURL = "https://classroom.google.com";

            try {
                const [htmlRes, iconRes] = await Promise.all([fetch(codeURL), fetch(iconURL)]);
                const html = await htmlRes.text();
                const iconBlob = await iconRes.blob();
                const localIconURL = URL.createObjectURL(iconBlob);
                const win = window.open("about:blank", "_blank");

                if (win) {
                    const content = `
                        <!DOCTYPE html>
                        <html>
                        <head>
                            <title>${tabName}</title>
                            <link id="favicon" rel="icon" type="image/x-icon" href="${localIconURL}">
                            <style>body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }</style>
                        </head>
                        <body>
                            ${html}
                            <script>const link = document.getElementById('favicon'); link.href = "${localIconURL}";<\/script>
                        </body>
                        </html>`;
                    win.document.open();
                    win.document.write(content);
                    win.document.close();
                    window.location.href = redirectURL;
                } else {
                    errorMsg.innerText = "Please allow pop-ups to continue.";
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                console.error("Launch Failed:", err);
                closeLogin();
                startApp(); // Fallback to canvas
            }
        } else {
            // Wrong credentials
            errorMsg.innerText = "Invalid Username or Password";
            errorMsg.style.display = 'block';
            document.getElementById('password').value = ""; // Clear password for security
        }
    }

    // --- 4. CANVAS CORE LOGIC ---
    const canvas = document.getElementById('canvis');
    const ctx = canvas.getContext('2d');
    const colorPicker = document.getElementById('colorPicker');
    const lineWidth = document.getElementById('lineWidth');
    let painting = false;

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function draw(e) {
        if (!painting) return;
        ctx.lineWidth = lineWidth.value;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = colorPicker.value;
        ctx.lineTo(e.clientX, e.clientY);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(e.clientX, e.clientY);
    }

    canvas.addEventListener('mousedown', (e) => { painting = true; draw(e); });
    canvas.addEventListener('mouseup', () => { painting = false; ctx.beginPath(); });
    canvas.addEventListener('mousemove', draw);
    function clearCanvas() { ctx.fillStyle = "white"; ctx.fillRect(0, 0, canvas.width, canvas.height); }
    function saveCanvas() {
        const link = document.createElement('a');
        link.download = 'digital-canvas.png';
        link.href = canvas.toDataURL();
        link.click();
    }
    window.addEventListener('resize', () => { if (document.getElementById('canvas-container').style.display === 'block') resizeCanvas(); });
</script>
</body>
</html>
